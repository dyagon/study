# infra/postgresql.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: your_pg_password
      POSTGRES_DB: main_db
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
