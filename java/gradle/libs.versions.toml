# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
# junit = "5.14.1"
# junit-platform = "1.14.1"
junit = "6.0.1"
junit-platform = "6.0.1"

# netty
netty = "4.2.7.Final"
netty-tcnative = "2.0.74.Final"

# bouncy castle (for PEM certificate parsing)
bouncycastle = "1.78.1"

# protobuf
protobuf = "4.28.2"

# Apache HttpClient
httpclient5 = "5.3.1"

# Apache Curator
curator = "5.8.0"

# Jedis (Redis client)
jedis = "5.2.0"

# Redisson (Redis client, distributed objects)
redisson = "3.35.0"


[libraries]
# 基础工具库
guava = { module = "com.google.guava:guava", version = "33.5.0-jre" }
lombok = { module = "org.projectlombok:lombok", version = "1.18.42" }

# 网络框架
netty-all = { module = "io.netty:netty-all", version.ref = "netty" }
netty-codec-http = { module = "io.netty:netty-codec-http", version.ref = "netty" }
reactor-netty-core = { module = "io.projectreactor.netty:reactor-netty-core", version = "1.3.0-RC1" }
reactor-netty-http = { module = "io.projectreactor.netty:reactor-netty-http", version = "1.3.0-RC1" }
netty-tcnative-boringssl-static = { module = "io.netty:netty-tcnative-boringssl-static", version.ref = "netty-tcnative" }
# Apache HttpClient v5
httpclient5 = { module = "org.apache.httpcomponents.client5:httpclient5", version.ref = "httpclient5" }
httpcore5 = { module = "org.apache.httpcomponents.core5:httpcore5", version.ref = "httpclient5" }

# 响应式编程
rxjava3 = { module = "io.reactivex.rxjava3:rxjava", version = "3.1.8" }
resilience4j-all = { module = "io.github.resilience4j:resilience4j-all", version = "2.2.0" }

# Apache Camel
camel-core = { module = "org.apache.camel:camel-core", version = "4.15.0" }
camel-main = { module = "org.apache.camel:camel-main", version = "4.15.0" }
camel-file = { module = "org.apache.camel:camel-file", version = "4.15.0" }

# Spring 框架
spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version = "3.5.6" }
spring-boot-starter-integration = { module = "org.springframework.boot:spring-boot-starter-integration", version = "3.5.6" }
springBootStarterDataRedis = { module = "org.springframework.boot:spring-boot-starter-data-redis", version = "3.5.6" }
springBootStarterTest = { module = "org.springframework.boot:spring-boot-starter-test", version = "3.5.6" }
spring-integration-file = { module = "org.springframework.integration:spring-integration-file", version = "6.3.4" }

# JSON 处理
jackson-databind = { module = "com.fasterxml.jackson.core:jackson-databind", version = "2.20.1" }
jackson-core = { module = "com.fasterxml.jackson.core:jackson-core", version = "2.20.1" }
jackson-annotations = { module = "com.fasterxml.jackson.core:jackson-annotations", version = "2.20" }
jackson-datatype-jsr310 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310", version = "2.20.1" }
jackson-datatype-jdk8 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jdk8", version = "2.20.1" }
jackson-datatype-hibernate5 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-hibernate5", version = "2.20.1" }

# JSON2
fastjson2 = { module = "com.alibaba.fastjson2:fastjson2", version = "2.0.58" }

# Protobuf
protobuf-java = { module = "com.google.protobuf:protobuf-java", version.ref = "protobuf" }
protobuf-java-util = { module = "com.google.protobuf:protobuf-java-util", version.ref = "protobuf" }

# 日志框架
slf4j-api = { module = "org.slf4j:slf4j-api", version = "2.0.13" }
logback-classic = { module = "ch.qos.logback:logback-classic", version = "1.5.16" }

# Bouncy Castle (for PEM certificate parsing)
bouncycastle-provider = { module = "org.bouncycastle:bcprov-jdk18on", version.ref = "bouncycastle" }
bouncycastle-pkix = { module = "org.bouncycastle:bcpkix-jdk18on", version.ref = "bouncycastle" }

# Groovy
groovy-all = { module = "org.codehaus.groovy:groovy-all", version = "3.0.25" }
spock-core = { module = "org.spockframework:spock-core", version = "2.3-groovy-3.0" }

# Apache Curator
curator-framework = { module = "org.apache.curator:curator-framework", version.ref = "curator" }
curator-recipes = { module = "org.apache.curator:curator-recipes", version.ref = "curator" }
curator-client = { module = "org.apache.curator:curator-client", version.ref = "curator" }

# Jedis
jedis = { module = "redis.clients:jedis", version.ref = "jedis" }

# Redisson
redisson = { module = "org.redisson:redisson", version.ref = "redisson" }

# 测试框架
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "junit" }
junit-jupiter-engine = { module = "org.junit.jupiter:junit-jupiter-engine", version.ref = "junit" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }
junit-platform-commons = { module = "org.junit.platform:junit-platform-commons", version.ref = "junit-platform" }
junit-platform-engine = { module = "org.junit.platform:junit-platform-engine", version.ref = "junit-platform" }